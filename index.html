<style>
:root{
  --bg:#0B0F14;--bg2:#0F151D;--card:#141C26;--card2:#1B2530;--line:#243140;
  --txt:#EAF2F8;--muted:#8DA0B2;--faint:#5A6B7B;
  --accent:#10B981;--accent2:#0EA5E9;--accent-d:#0C3A32;
  --good:#2BD67B;--warn:#FFB23E;--bad:#FF5C72;--rose:#FF6B9D;
  --r:18px;--maxw:480px;--nav:rgba(15,21,29,.92);
  --sh:0 1px 2px rgba(0,0,0,.18),0 12px 28px -18px rgba(0,0,0,.55);
}
html[data-mode=light]{
  --bg:#F1F7F5;--bg2:#FFFFFF;--card:#FFFFFF;--card2:#EAF2EF;--line:#DCE6E2;
  --txt:#12211C;--muted:#5B6B65;--faint:#8496; --faint:#849690;--nav:rgba(255,255,255,.85);
  --accent-d:#D6F5EC;--sh:0 1px 2px rgba(20,40,32,.05),0 12px 26px -16px rgba(20,40,32,.2);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:'Inter','Segoe UI',system-ui,Arial,sans-serif;letter-spacing:-.01em;overflow:hidden}
html[dir=rtl] body{font-family:'IBM Plex Sans Arabic','Segoe UI',Tahoma,Arial,sans-serif;letter-spacing:normal}
#app{width:100%;max-width:var(--maxw);height:100vh;height:100dvh;background:var(--bg);position:relative;overflow:hidden;display:flex;flex-direction:column}
@media(min-width:480px){#app{margin:0 auto;box-shadow:0 0 60px rgba(0,0,0,.5);border-left:1px solid var(--line);border-right:1px solid var(--line)}}
#screens{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.screen{flex:1;min-height:0;display:none;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;animation:fade .3s ease}
.screen.active{display:flex}
.screen::-webkit-scrollbar{width:0}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
.content{padding:6px 18px 0;display:flex;flex-direction:column;gap:15px}
.content>*{animation:rise .4s cubic-bezier(.2,.8,.2,1) both}
.content>*:nth-child(2){animation-delay:.04s}.content>*:nth-child(3){animation-delay:.08s}.content>*:nth-child(4){animation-delay:.12s}.content>*:nth-child(n+5){animation-delay:.16s}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:calc(16px + env(safe-area-inset-top)) 18px 12px;background:linear-gradient(180deg,var(--bg) 82%,transparent);backdrop-filter:blur(6px)}
.topbar h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-.5px}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.iconbtn{min-width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:19px;cursor:pointer;color:var(--txt)}
.spacer{flex:1}
.section-title{font-size:12.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:6px 2px -4px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;box-shadow:var(--sh)}
.card.tap{cursor:pointer;transition:.15s}.card.tap:active{transform:scale(.985);background:var(--card2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px}
.kpi .v{font-size:24px;font-weight:800;letter-spacing:-1px}
.kpi .l{font-size:11px;color:var(--muted);margin-top:2px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:14px;font-weight:700;font-size:15.5px;cursor:pointer;transition:.15s;font-family:inherit}
.btn:active{transform:translateY(1px) scale(.99)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--txt)}
.btn-danger{background:rgba(255,92,114,.14);border:1px solid rgba(255,92,114,.4);color:#ff8b9b}
.btn-sm{padding:10px 15px;font-size:13.5px;width:auto;border-radius:11px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.field label{font-size:13px;color:var(--muted);font-weight:600;margin-inline-start:2px}
.input{width:100%;padding:13px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:13px;color:var(--txt);font-size:15px;font-family:inherit}
.input:focus{outline:none;border-color:var(--accent)}
textarea.input{resize:vertical;min-height:78px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:9px 14px;border-radius:11px;background:var(--bg2);border:1px solid var(--line);font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;font-family:inherit}
.chip.on{background:var(--accent-d);border-color:var(--accent);color:var(--accent)}
.chip:active{transform:scale(.96)}
.scale{display:flex;gap:6px;flex-wrap:wrap}
.scale button{flex:1;min-width:30px;padding:11px 0;border-radius:10px;background:var(--bg2);border:1px solid var(--line);color:var(--muted);font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.scale button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.scale button:active{transform:scale(.92)}
.li{display:flex;align-items:center;gap:13px;padding:13px 4px;border-bottom:1px solid var(--line)}
.li:last-child{border-bottom:none}
.li .ic{width:40px;height:40px;border-radius:11px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.li .tx{flex:1;min-width:0}.li .tx b{font-size:14.5px;font-weight:600;display:block}.li .tx small{font-size:12.5px;color:var(--muted)}
.li .chev{color:var(--faint);font-size:16px}
html[dir=rtl] .chev{transform:scaleX(-1)}
.tabbar{position:absolute;bottom:0;left:0;right:0;min-height:76px;background:var(--nav);backdrop-filter:blur(16px);border-top:1px solid var(--line);display:flex;padding:8px 6px calc(14px + env(safe-area-inset-bottom));z-index:30}
.tabbar.hidden{display:none}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--faint);font-size:10.5px;font-weight:600;cursor:pointer;background:none;border:none;border-radius:12px;font-family:inherit;position:relative}
.tab .ic{font-size:21px;line-height:1}
.tab.on{color:var(--accent)}
.tab.on::before{content:"";position:absolute;top:1px;width:26px;height:3px;border-radius:3px;background:var(--accent)}
.tab:active{transform:scale(.92)}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;align-items:flex-end;animation:fade .2s}
.sheet-bg.open{display:flex}
.sheet{width:100%;max-height:90%;overflow-y:auto;background:var(--bg2);border-radius:24px 24px 0 0;border-top:1px solid var(--line);padding:10px 18px calc(28px + env(safe-area-inset-bottom));animation:up .3s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.grip{width:40px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 14px}
.toast{position:absolute;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--accent);color:var(--txt);padding:12px 20px;border-radius:14px;font-size:14px;font-weight:600;z-index:80;opacity:0;transition:.3s;box-shadow:var(--sh);pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pbar{height:7px;border-radius:6px;background:var(--bg2);overflow:hidden}
.pbar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10.5px;font-weight:700}
.badge.accent{background:var(--accent-d);color:var(--accent)}
.splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:30px;background:radial-gradient(120% 80% at 50% 0%,#0c3a32 0%,var(--bg) 55%)}
.logo-mark{width:92px;height:92px;border-radius:27px;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:#fff;background:linear-gradient(140deg,var(--accent),var(--accent2));box-shadow:0 20px 50px rgba(16,185,129,.35)}
.disc-note{background:var(--card2);border-radius:12px;padding:11px 13px;font-size:11.5px;color:var(--muted);line-height:1.55}
.center{text-align:center}.muted{color:var(--muted)}.row{display:flex;align-items:center}.between{display:flex;align-items:center;justify-content:space-between}
.empty-art{width:84px;height:84px;margin:2px auto 8px;color:var(--accent);opacity:.9}
.empty-art svg{width:100%;height:100%}
.pathcard{border-radius:16px;padding:15px;border:1px solid var(--line);cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.pathcard:active{transform:scale(.985)}
.pathcard .pi{font-size:26px}
.pathcard b{display:block;font-size:15px;margin:8px 0 3px}
.pathcard small{color:var(--muted);font-size:12px;line-height:1.5}
.step{display:flex;gap:11px;padding:10px 2px}
.step .num{width:26px;height:26px;border-radius:50%;background:var(--accent-d);color:var(--accent);font-weight:800;font-size:12.5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step .st{font-size:13.5px;line-height:1.5}
a{color:var(--accent2)}
/* ===== premium polish layer — best-app finishing touches ===== */
:root{--ease-spring:cubic-bezier(.34,1.4,.5,1)}
html{scroll-behavior:smooth}
::selection{background:color-mix(in srgb,var(--accent) 30%,transparent)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:10px}
button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
.btn{transition:transform .18s var(--ease-spring),box-shadow .2s ease,background .2s ease,filter .2s ease}
.btn:active{transform:scale(.965)}
.btn-primary{box-shadow:0 10px 24px -12px color-mix(in srgb,var(--accent) 60%,transparent)}
.chip{transition:transform .18s var(--ease-spring),background .18s ease,color .18s ease,border-color .18s ease}
.chip:active,.li:active,.scale button:active{transform:scale(.96)}
.card.tap:active{transform:scale(.975)}
.iconbtn{transition:transform .16s var(--ease-spring)}
.iconbtn:active{transform:scale(.9)}
.tab:active .ic{transform:scale(.86)}
@media (hover:hover) and (pointer:fine){
  .card.tap:hover{transform:translateY(-2px)}
  .pathcard:hover{transform:translateY(-2px)}
  .chip:hover{border-color:color-mix(in srgb,var(--accent) 40%,var(--line))}
  .btn:hover{filter:brightness(1.05)}
}
.sheet-bg{backdrop-filter:blur(3px)}
.sheet{box-shadow:0 -12px 40px -18px rgba(0,0,0,.5)}
.toast{transition:opacity .28s ease, transform .3s var(--ease-spring);display:flex;align-items:center;justify-content:center}
.toast.ok{border-color:var(--good)}
.tst-check{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--good);color:#fff;font-size:12px;font-weight:800;margin-inline-end:8px;flex:none;animation:tstPop .5s var(--ease-spring)}
@keyframes tstPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.25) rotate(4deg)}100%{transform:scale(1) rotate(0)}}
.ringfx{transition:stroke-dashoffset .95s cubic-bezier(.34,1,.4,1)}
#fab{position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,0px));inset-inline-end:18px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;box-shadow:0 10px 26px rgba(0,0,0,.30),0 2px 6px rgba(0,0,0,.2);z-index:70;cursor:pointer;display:none;align-items:center;justify-content:center;transform:scale(.4);opacity:0;transition:transform .32s cubic-bezier(.34,1.4,.5,1),opacity .2s}
#fab.show{display:flex;transform:scale(1);opacity:1}
#fab:active{transform:scale(.9)}
@media(min-width:760px){#fab{inset-inline-end:calc(50% - 230px)}}
.hero{background:linear-gradient(135deg,var(--accent),color-mix(in srgb,var(--accent) 55%,var(--accent2,var(--accent))));color:#fff;padding:calc(18px + env(safe-area-inset-top,0px)) 18px 22px;border-radius:0 0 22px 22px;box-shadow:0 6px 18px color-mix(in srgb,var(--accent) 30%,transparent)}
.hero .hgreet{font-size:22px;font-weight:800;letter-spacing:-.3px}
.hero .hsub{font-size:13.5px;opacity:.92;margin-top:4px;font-weight:500}
.hero .hero-gear{background:rgba(255,255,255,.18);color:#fff;border:none}
@media (pointer:fine){
  ::-webkit-scrollbar{width:9px}
  ::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 38%,transparent);border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-track{background:transparent}
}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}.btn:active,.chip:active,.card.tap:active,.iconbtn:active,.card.tap:hover,.pathcard:hover{transform:none}}
</style>

</div>
<script>
/* ============================================================

const $=(s,r)=>(r||document).querySelector(s);
const el=(h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstElementChild;};
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function rid(){return Math.random().toString(36).slice(2,10);}
const KEY='qawam_v1';

/* ---------- i18n ---------- */
const I18N={
  appName:{en:'Qawam',ar:'قوام'},tagline:{en:'your weight & health companion',ar:'رفيقك في إدارة الوزن والصحة'},
  getStarted:{en:'Get started',ar:'لنبدأ'},chooseLang:{en:'Choose your language',ar:'اختر لغتك'},continue:{en:'Continue',ar:'متابعة'},

  consentT:{en:'Before we start',ar:'قبل أن نبدأ'},
  consentBody:{en:"Qawam is a non-medical health companion for people managing their weight. It helps you explore the dietary, medical, endoscopic and surgical pathways, record your weight, waist, meals, activity, medications, post-procedure diet phases and vitamins, see descriptive trends, and learn.\n\nIt does NOT provide medical advice, diagnosis, predictions, calorie prescriptions, drug dosing or treatment recommendations, and is not a medical device. All numbers, scores and charts are descriptive only.\n\nAlways consult your healthcare provider before starting any diet, medication, procedure or surgery. If you have severe abdominal pain, persistent vomiting, black stools, chest pain or trouble breathing, seek urgent care.",ar:"قوام رفيق صحي غير طبي لمن يديرون وزنهم. يساعدك على استكشاف المسارات الغذائية والدوائية والتنظيرية والجراحية، وتسجيل الوزن والخصر والوجبات والنشاط والأدوية ومراحل الغذاء بعد الإجراء والفيتامينات، ورؤية اتجاهات وصفية، والتعلّم.\n\nلا يقدّم نصيحة طبية أو تشخيصًا أو تنبؤًا أو وصفات سعرات أو جرعات دواء أو توصيات علاجية، وليس جهازًا طبيًا. كل الأرقام والدرجات والرسوم وصفية فقط.\n\nاستشر دائمًا مقدّم الرعاية الصحية قبل بدء أي حمية أو دواء أو إجراء أو جراحة. إذا كان لديك ألم بطن شديد أو قيء مستمر أو براز أسود أو ألم صدر أو صعوبة تنفّس، اطلب رعاية عاجلة."},
  yourName:{en:'Your name',ar:'اسمك'},namePh:{en:'e.g. Sara',ar:'مثال: سارة'},
  profileT:{en:'A few details',ar:'بعض التفاصيل'},profileSub:{en:'Used only on this device to personalise your trends. Everything is optional.',ar:'تُستخدم على هذا الجهاز فقط لتخصيص اتجاهاتك. كل شيء اختياري.'},
  sex:{en:'Sex',ar:'الجنس'},male:{en:'Male',ar:'ذكر'},female:{en:'Female',ar:'أنثى'},
  height:{en:'Height (cm)',ar:'الطول (سم)'},curWeight:{en:'Current weight (kg)',ar:'الوزن الحالي (كجم)'},startWeight:{en:'Starting weight (kg)',ar:'وزن البداية (كجم)'},targetWeight:{en:'Goal weight (kg)',ar:'الوزن المستهدف (كجم)'},
  yourPathway:{en:'Which pathway are you exploring?',ar:'أي مسار تستكشف؟'},
  tabToday:{en:'Today',ar:'اليوم'},tabTrack:{en:'Track',ar:'تتبّع'},tabProgress:{en:'Progress',ar:'التقدّم'},tabLearn:{en:'Learn',ar:'تعلّم'},tabMore:{en:'More',ar:'المزيد'},
  goodMorning:{en:'Good morning',ar:'صباح الخير'},goodAfternoon:{en:'Good afternoon',ar:'مساء الخير'},goodEvening:{en:'Good evening',ar:'مساء الخير'},
  quickLog:{en:'Quick log',ar:'تسجيل سريع'},
  logWeight:{en:'Weight',ar:'الوزن'},logWaist:{en:'Waist',ar:'الخصر'},logMeal:{en:'Meal',ar:'وجبة'},logActivity:{en:'Activity',ar:'نشاط'},logMed:{en:'Medication',ar:'دواء'},logSymptom:{en:'Symptom',ar:'عَرَض'},

  streak:{en:'day streak',ar:'يوم متتابع'},logsToday:{en:'logs today',ar:'سجلات اليوم'},
  trackT:{en:'Track',ar:'تتبّع'},trackSub:{en:'Log weight, meals, activity & more',ar:'سجّل الوزن والوجبات والنشاط والمزيد'},
  progressT:{en:'Progress',ar:'التقدّم'},progressSub:{en:'Descriptive trends over time',ar:'اتجاهات وصفية عبر الوقت'},
  learnT:{en:'Learn',ar:'تعلّم'},learnSub:{en:'Understand every pathway',ar:'افهم كل مسار'},
  moreT:{en:'More',ar:'المزيد'},
  pathwaysT:{en:'Treatment pathways',ar:'مسارات العلاج'},pathwaysSub:{en:'Four routes to a healthier weight',ar:'أربعة مسارات لوزن أصحّ'},
  notes:{en:'Notes (optional)',ar:'ملاحظات (اختياري)'},notesPh:{en:'Anything to remember…',ar:'أي شيء تود تذكّره…'},save:{en:'Save',ar:'حفظ'},cancel:{en:'Cancel',ar:'إلغاء'},saved:{en:'Saved',ar:'تم الحفظ'},loggedOk:{en:'Logged ✓',ar:'تم التسجيل ✓'},
  minRead:{en:'min read',ar:'دقيقة قراءة'},
  none:{en:'None',ar:'لا شيء'},mild:{en:'Mild',ar:'خفيف'},moderate:{en:'Moderate',ar:'متوسط'},severe:{en:'Severe',ar:'شديد'},
  export:{en:'Export my data',ar:'تصدير بياناتي'},del:{en:'Delete my data',ar:'حذف بياناتي'},
  theme:{en:'Theme',ar:'المظهر'},language:{en:'Language',ar:'اللغة'},about:{en:'About & disclaimer',ar:'حول وإخلاء المسؤولية'},share:{en:'Share with my doctor',ar:'مشاركة مع طبيبي'},

const ART=[
 {id:'sleepstress',icon:'😴',cat:'living',min:4,t:['Sleep, stress & weight','النوم والتوتر والوزن'],body:['Short or poor sleep raises the hunger hormone ghrelin and lowers fullness signals, so you crave more the next day — especially sugary, high-calorie foods. Chronic stress adds cortisol, which drives appetite and belly-fat storage. Protect 7–9 hours of sleep with a consistent bedtime and a screen-free wind-down, and build non-food ways to handle stress such as a walk, prayer, breathing or talking to someone. Sleep and stress are not side issues — they are core weight tools.','النوم القصير أو السيّئ يرفع هرمون الجوع (غريلين) ويخفض إشارات الشبع، فتشتهي أكثر في اليوم التالي — خاصة الأطعمة السكرية عالية السعرات. التوتر المزمن يضيف الكورتيزول الذي يزيد الشهية وتخزين دهون البطن. احمِ ٧–٩ ساعات نوم بموعد ثابت وتهدئة بلا شاشات، وابنِ وسائل غير غذائية للتوتر كالمشي أو الصلاة أو التنفّس أو الحديث مع شخص. النوم والتوتر ليسا أمرين هامشيين بل أداتان أساسيتان للوزن.']},
 {id:'emoteat',icon:'💭',cat:'living',min:4,t:['Emotional & stress eating','الأكل العاطفي والتوتري'],body:['Eating to soothe boredom, stress or sadness is common and human — not a failure. The key is to notice the pattern: pause before eating and ask whether you are physically hungry or feeling something. Physical hunger builds gradually and is satisfied by most foods; emotional hunger is sudden and craves specific comfort foods. Build a short menu of non-food comforts (a walk, a call, wudu and prayer) and keep trigger foods out of easy reach. Be kind — awareness, not guilt, is what changes the habit.','الأكل لتهدئة الملل أو التوتر أو الحزن شائع وإنساني — لا فشل. المفتاح ملاحظة النمط: توقّف قبل الأكل واسأل هل أنت جائع جسديًا أم تشعر بشيء. الجوع الجسدي يتصاعد تدريجيًا ويرضيه أي طعام؛ والعاطفي فجائي ويشتهي أطعمة راحة محددة. جهّز قائمة قصيرة من وسائل الراحة غير الغذائية (مشي، مكالمة، وضوء وصلاة) وأبعِد أطعمة التحفيز. كن لطيفًا — الوعي لا الذنب هو ما يغيّر العادة.']},
 {id:'ramadan',icon:'🌙',cat:'diet',min:4,t:['Ramadan & fasting with weight goals','رمضان والصيام مع أهداف الوزن'],body:['Ramadan can support or undo weight goals depending on how you break the fast. Open with water and a few dates, then pause for Maghrib before a balanced meal — this prevents the huge, fast plate that leads to overeating. Make protein and vegetables the core, go easy on fried foods and sweets, and keep suhoor protein- and fiber-rich to stay full and steady. Sip water between iftar and suhoor to stay hydrated. If you take weight or diabetes medication, ask your doctor how to adjust it for fasting.','قد يدعم رمضان أهداف الوزن أو يقوّضها حسب طريقة الإفطار. افتح بالماء وبضع تمرات، ثم توقّف لصلاة المغرب قبل وجبة متوازنة — يمنع هذا الطبق الكبير السريع الذي يقود للإفراط. اجعل البروتين والخضار الأساس، وخفّف المقالي والحلويات، واجعل السحور غنيًا بالبروتين والألياف لتبقى شبعانًا ثابتًا. ارتشف الماء بين الإفطار والسحور للترطيب. وإن كنت تأخذ دواء وزن أو سكري، اسأل طبيبك كيف تعدّله للصيام.']},
 {id:'eatout',icon:'🍴',cat:'diet',min:3,t:['Eating out & social meals','الأكل خارجًا والمناسبات'],body:['Restaurants and gatherings are part of life — a plan keeps them from derailing you. Look at the menu ahead, make protein and vegetables the anchor, and ask for grilled rather than fried, with sauces on the side. Watch liquid calories: juice, soft drinks and sweet coffees add up fast. At buffets and family feasts, take one plate, eat slowly, and enjoy the company rather than a second round. One meal never defines your week — return to your routine at the next one.','المطاعم والتجمّعات جزء من الحياة — والخطة تمنعها من إخراجك عن مسارك. اطّلع على القائمة مسبقًا، واجعل البروتين والخضار الأساس، واطلب المشوي بدل المقلي والصلصات جانبًا. انتبه لسعرات المشروبات: العصائر والغازيات والقهوة المحلّاة تتراكم بسرعة. في البوفيهات والولائم خذ طبقًا واحدًا، وكُل ببطء، واستمتع بالرفقة بدل جولة ثانية. وجبة واحدة لا تحدّد أسبوعك — عُد لروتينك في الوجبة التالية.']},
 {id:'proteinmuscle',icon:'🥚',cat:'diet',min:4,t:['Protein & keeping your muscle','البروتين والحفاظ على العضلات'],body:['When you lose weight, some of it can come from muscle unless you protect it — and muscle keeps your metabolism and strength up. Two things guard it: enough protein spread across the day, and resistance activity (bodyweight moves, bands or weights) a couple of times a week. Good sources include eggs, dairy, chicken, fish, meat, legumes and Greek yogurt; aim to include protein at every meal, starting with breakfast. This matters even more on weight-loss medication or after surgery, when intake is smaller. Muscle is not just for athletes — it is what keeps you strong and independent as you age.','عند إنقاص الوزن قد يأتي جزء منه من العضلات ما لم تحمِها — والعضلات تُبقي أيضك وقوّتك مرتفعين. أمران يحفظانها: بروتين كافٍ موزّع على اليوم، ونشاط مقاومة (تمارين وزن الجسم أو الأربطة أو الأوزان) مرتين أسبوعيًا. من المصادر الجيّدة: البيض والألبان والدجاج والسمك واللحم والبقوليات والزبادي اليوناني؛ واستهدف البروتين في كل وجبة بدءًا من الفطور. يزداد هذا أهمية مع دواء إنقاص الوزن أو بعد الجراحة حيث تقلّ الكمية. العضلات ليست للرياضيين فقط — بل ما يُبقيك قويًا مستقلًا مع التقدّم في العمر.']},
 {id:'whenmed',icon:'⚖️',cat:'medical',min:3,t:['When is medication considered?','متى يُدرَس الدواء؟'],body:['Weight-loss medication is generally considered when lifestyle change alone has not been enough and BMI is in the obesity range, or in the overweight range together with a weight-related condition such as type 2 diabetes, high blood pressure or sleep apnoea. It is a medical decision your doctor makes after reviewing your health, other medicines and goals — not something to start on your own. Medication works alongside eating and activity changes, not instead of them. If you are curious whether it fits you, bring it up at your next visit.','يُدرَس دواء إنقاص الوزن عمومًا عندما لا يكفي تغيير نمط الحياة وحده ويكون المؤشر في نطاق السمنة، أو في نطاق زيادة الوزن مع حالة مرتبطة كالسكري من النوع الثاني أو ارتفاع الضغط أو انقطاع النفس النومي. إنه قرار طبي يتخذه طبيبك بعد مراجعة صحتك وأدويتك وأهدافك — لا شيء تبدأه بنفسك. الدواء يعمل مع تغييرات الأكل والنشاط لا بدلًا منها. وإن أردت معرفة إن كان يناسبك، اطرح الأمر في زيارتك القادمة.']},
 {id:'aftersurg',icon:'📅',cat:'surgery',min:4,t:['Life after surgery — the long term','الحياة بعد الجراحة — المدى الطويل'],body:['The first year after bariatric surgery brings the fastest change, but lasting success is built over the years that follow. Keep protein first, take your vitamins for life, and stay active to protect muscle and bone. Some weight regain is common and is usually addressed by revisiting portions, grazing, sugary drinks, activity and follow-up — not by giving up. Attend your long-term appointments and blood tests even when you feel well, and reach out early if old habits creep back. Surgery is a powerful tool; your daily habits are what keep it working.','السنة الأولى بعد جراحة السمنة تجلب أسرع تغيير، لكن النجاح الدائم يُبنى في السنوات التالية. أبقِ البروتين أولًا، وتناول فيتاميناتك مدى الحياة، وابقَ نشطًا لحماية العضلات والعظام. استرجاع بعض الوزن شائع ويُعالَج عادة بمراجعة الحصص والقضم المستمر والمشروبات المحلّاة والنشاط والمتابعة — لا بالاستسلام. احضر مواعيدك وتحاليلك بعيدة المدى حتى عند الشعور بالتحسّن، وتواصل مبكرًا إن عادت العادات القديمة. الجراحة أداة قوية؛ وعاداتك اليومية هي ما يُبقيها فعّالة.']},
 {id:'basics',icon:'⚖️',cat:'basics',min:4,t:['Understanding weight & health','فهم الوزن والصحة'],body:[
  "Excess weight is a chronic, relapsing medical condition — not a lack of willpower. Genes, hormones, sleep, stress, medications and environment all shape appetite and how the body stores energy.\n\nBecause it is chronic, weight is managed over the long term, and small sustained changes beat short crash diets. Even a 5–10% weight loss can meaningfully improve blood sugar, blood pressure, cholesterol, joint pain, sleep apnoea and fatty liver.\n\nThere is no single right path. Diet and lifestyle are the foundation for everyone; medications, endoscopic procedures and surgery are added tools chosen with your doctor based on your health and goals.",
  "الوزن الزائد حالة طبية مزمنة قابلة للانتكاس — وليست نقص إرادة. الجينات والهرمونات والنوم والتوتر والأدوية والبيئة كلها تُشكّل الشهية وطريقة تخزين الجسم للطاقة.\n\nلأنه مزمن، يُدار الوزن على المدى الطويل، والتغييرات الصغيرة المستدامة تتفوّق على الحميات القاسية القصيرة. حتى نقص ٥–١٠٪ من الوزن يحسّن بوضوح سكّر الدم والضغط والكوليسترول وألم المفاصل وانقطاع النفس النومي والكبد الدهني.\n\nلا يوجد مسار وحيد صحيح. الغذاء ونمط الحياة أساس للجميع؛ والأدوية والإجراءات التنظيرية والجراحة أدوات إضافية تُختار مع طبيبك حسب صحتك وأهدافك."]},
 {id:'bmi',icon:'📏',cat:'basics',min:3,t:['BMI, waist & what they mean','مؤشر الكتلة والخصر ومعناهما'],body:[
  "Body mass index (BMI) is weight (kg) divided by height (m) squared. As a rough guide in adults: under 18.5 is underweight, 18.5–24.9 is a healthy range, 25–29.9 is overweight, and 30 or above is in the obesity range (class I 30–34.9, class II 35–39.9, class III 40+).\n\nBMI is only a screening number — it does not measure muscle, fat distribution or health directly, and cut-offs can differ for some populations. Waist circumference adds useful information about fat around the organs: broadly, higher risk is often quoted above about 102 cm in men and 88 cm in women (some guidance uses 94 cm and 80 cm).\n\nUse these as conversation starters with your team, not as verdicts about your health.",
  "مؤشر كتلة الجسم هو الوزن (كجم) مقسومًا على مربع الطول (متر). كدليل تقريبي لدى البالغين: أقل من ١٨٫٥ نقص وزن، ١٨٫٥–٢٤٫٩ نطاق صحي، ٢٥–٢٩٫٩ زيادة وزن، و٣٠ فأكثر ضمن نطاق السمنة (الدرجة الأولى ٣٠–٣٤٫٩، الثانية ٣٥–٣٩٫٩، الثالثة ٤٠+).\n\nالمؤشر رقم فحص أوّلي فقط — لا يقيس العضلات أو توزيع الدهون أو الصحة مباشرة، وقد تختلف الحدود لبعض المجموعات. محيط الخصر يضيف معلومة مفيدة عن الدهون حول الأعضاء: عمومًا يُذكر ارتفاع الخطر فوق نحو ١٠٢ سم للرجال و٨٨ سم للنساء (وبعض التوجيهات تستخدم ٩٤ و٨٠ سم).\n\nاستخدمها كبداية للنقاش مع فريقك، لا كأحكام على صحتك."]},
 {id:'diet',icon:'🥗',cat:'diet',min:5,t:['Eating for lasting weight change','الأكل من أجل تغيير دائم'],body:[
  "No single diet is magic — the best eating plan is one you can keep. Most successful approaches share the same core: more protein and vegetables, more whole (less processed) foods, fewer sugary drinks and refined snacks, and portions matched to your needs.\n\nPractical habits that help: fill half your plate with vegetables, make protein the anchor of each meal, drink water instead of juice and soda, slow down and notice fullness, and don't keep tempting snacks within easy reach. Planning meals ahead reduces impulsive choices.\n\nCrash diets tend to rebound because they are hard to sustain and can reduce muscle. Aim for a gradual, comfortable deficit and combine it with activity. A dietitian can tailor this — especially with diabetes, kidney disease, pregnancy, or before and after a procedure.",
  "لا حمية واحدة سحرية — أفضل خطة أكل هي التي تستطيع الاستمرار عليها. أغلب الأساليب الناجحة تشترك في الجوهر: بروتين وخضار أكثر، أطعمة كاملة (أقل معالجة) أكثر، مشروبات محلّاة ووجبات مكرّرة أقل، وحصص تناسب احتياجك.\n\nعادات عملية تساعد: املأ نصف الطبق خضارًا، واجعل البروتين محور كل وجبة، واشرب الماء بدل العصير والمشروبات الغازية، وتمهّل ولاحظ الشبع، ولا تُبقِ الوجبات المغرية في المتناول. التخطيط المسبق للوجبات يقلّل الخيارات الاندفاعية.\n\nالحميات القاسية تميل للارتداد لصعوبة الاستمرار وفقدان العضلات. استهدف عجزًا تدريجيًا مريحًا مع النشاط. يمكن لأخصائي التغذية تفصيلها — خاصة مع السكري أو مرض الكلى أو الحمل أو قبل وبعد الإجراءات."]},
 {id:'activity',icon:'🏃',cat:'diet',min:4,t:['Activity, sleep & habits','النشاط والنوم والعادات'],body:[
  "Physical activity supports weight change, protects muscle, and improves mood, blood sugar and heart health even when the scale moves slowly. A common target is at least 150 minutes a week of moderate activity (like brisk walking) plus muscle-strengthening twice a week — but the best plan is one you'll actually do. Start small and build.\n\nSleep and stress matter more than most expect: short or poor sleep raises appetite hormones and cravings, and stress can drive emotional eating. Protecting 7–9 hours of sleep and finding non-food ways to unwind both help.\n\nHabits beat motivation. Anchor new behaviours to existing routines, make the healthy choice the easy one, and track a few simple things so you can see progress and adjust.",
  "النشاط البدني يدعم تغيير الوزن ويحمي العضلات ويحسّن المزاج وسكّر الدم وصحة القلب حتى عندما يتحرّك الميزان ببطء. هدف شائع هو ١٥٠ دقيقة أسبوعيًا على الأقل من النشاط المعتدل (كالمشي السريع) مع تقوية العضلات مرتين أسبوعيًا — لكن أفضل خطة هي التي ستلتزم بها. ابدأ صغيرًا وابنِ تدريجيًا.\n\nالنوم والتوتر أهم مما يظن الكثير: النوم القصير أو السيّئ يرفع هرمونات الشهية والرغبة، والتوتر قد يقود للأكل العاطفي. حماية ٧–٩ ساعات نوم وإيجاد وسائل استرخاء غير غذائية يساعدان.\n\nالعادات تتغلّب على الحماس. اربط السلوكيات الجديدة بروتينك الحالي، واجعل الخيار الصحي أسهل، وتابع أمورًا بسيطة لترى التقدّم وتعدّل."]},
 {id:'meds',icon:'💊',cat:'medical',min:5,t:['Weight-loss medications explained','شرح أدوية إنقاص الوزن'],body:[
  "Anti-obesity medications are prescription treatments that help when lifestyle change alone isn't enough. Most modern options are GLP-1 based — semaglutide and liraglutide, and the GIP/GLP-1 medicine tirzepatide. They mimic gut hormones that reduce appetite and slow stomach emptying, so you feel full sooner and eat less. Others work differently: orlistat blocks some fat absorption; naltrexone–bupropion acts on appetite and cravings; phentermine is a short-term appetite suppressant.\n\nDoses are started low and increased slowly to limit side effects. The most common are gastrointestinal — nausea, fullness, constipation or diarrhoea — which usually ease with time and smaller, slower meals. Your doctor screens for conditions where a medicine isn't suitable and monitors your response.\n\nThese medicines are tools, not shortcuts: they work best alongside eating and activity changes, and weight often returns if they stop, so they are usually taken long term under review. Never start, stop, adjust or borrow a dose without your doctor.",
  "أدوية السمنة علاجات توصف عند عدم كفاية تغيير نمط الحياة وحده. أغلب الخيارات الحديثة قائمة على GLP-1 — سيماجلوتيد وليراجلوتيد، ودواء GIP/GLP-1 تيرزيباتيد. تحاكي هرمونات الأمعاء التي تقلّل الشهية وتبطئ إفراغ المعدة، فتشعر بالشبع أسرع وتأكل أقل. وأخرى تعمل بطرق مختلفة: أورليستات يمنع امتصاص بعض الدهون؛ نالتريكسون–بوبروبيون يؤثر على الشهية والرغبة؛ فينترمين مثبّط شهية قصير المدى.\n\nتُبدأ الجرعات منخفضة وتُرفع ببطء للحدّ من الآثار الجانبية. أكثرها شيوعًا هضمية — غثيان، امتلاء، إمساك أو إسهال — تخفّ عادة مع الوقت والوجبات الأصغر الأبطأ. يفحص طبيبك الحالات غير المناسبة للدواء ويتابع استجابتك.\n\nهذه الأدوية أدوات لا اختصارات: تعمل أفضل مع تغييرات الأكل والنشاط، وغالبًا يعود الوزن عند إيقافها، لذا تؤخذ عادة طويلًا تحت المتابعة. لا تبدأ أو توقف أو تعدّل أو تستعِر جرعة دون طبيبك."]},
 {id:'inject',icon:'💉',cat:'medical',min:3,t:['Injection tips & side effects','نصائح الحقن والآثار الجانبية'],body:[
  "If your medicine is an injection, technique makes it easier. It's usually given under the skin of the abdomen, thigh or upper arm; rotate the site each time to protect the skin. Store pens as directed (often refrigerated), let the pen reach a comfortable temperature, and use a fresh needle each dose. Pick a consistent day for weekly medicines.\n\nTo ease nausea, the most common early effect: eat smaller meals, stop when comfortably full, favour bland lower-fat foods, sip fluids, and avoid lying down right after eating. These effects usually fade as your body adjusts and as the dose is increased slowly.\n\nTell your doctor about severe or lasting vomiting, severe abdominal pain, signs of dehydration, or anything that worries you. Keep hydrated and keep up your protein and activity while on treatment.",
  "إن كان دواؤك حقنة، فالتقنية تُسهّلها. تُعطى عادة تحت جلد البطن أو الفخذ أو أعلى الذراع؛ بدّل الموضع كل مرة لحماية الجلد. احفظ الأقلام حسب التعليمات (غالبًا بالثلاجة)، ودع القلم يصل حرارة مريحة، واستخدم إبرة جديدة كل جرعة. اختر يومًا ثابتًا للأدوية الأسبوعية.\n\nلتخفيف الغثيان، أكثر الآثار المبكرة: وجبات أصغر، توقّف عند الشبع المريح، أطعمة خفيفة قليلة الدهن، ارتشاف السوائل، وتجنّب الاستلقاء بعد الأكل مباشرة. تخفّ هذه الآثار عادة مع تأقلم الجسم والرفع البطيء للجرعة.\n\nأخبر طبيبك بالقيء الشديد أو المستمر أو ألم البطن الشديد أو علامات الجفاف أو أي شيء يقلقك. حافظ على الترطيب والبروتين والنشاط أثناء العلاج."]},
 {id:'endo',icon:'🔬',cat:'endoscopic',min:5,t:['Endoscopic procedures','الإجراءات التنظيرية'],body:[
  "Endoscopic weight procedures are done with a flexible scope passed through the mouth — no surgical cuts and usually a quick recovery. They sit between medications and surgery in intensity.\n\n• Intragastric balloon: a soft balloon is placed in the stomach and filled, so you feel full sooner and eat less. It is temporary — usually removed after about six months — and works best paired with lifestyle change.\n• Endoscopic sleeve gastroplasty (ESG): internal stitches reshape the stomach into a narrow tube, reducing its volume without removing any tissue.\n• Aspiration therapy: a tube lets a portion of a meal be drained from the stomach after eating.\n\nAfter any of these you follow a staged diet — clear liquids, then full liquids, purée, soft foods and finally regular textures — sipping fluids often and eating slowly. Early nausea or cramping is common. Results depend on keeping the eating and activity habits going, so follow-up matters.",
  "الإجراءات التنظيرية للوزن تُجرى بمنظار مرن عبر الفم — دون شقوق جراحية وبتعافٍ سريع عادة. تقع بين الأدوية والجراحة في شدّتها.\n\n• البالون المعدي: يُوضع بالون ناعم في المعدة ويُملأ، فتشعر بالشبع أسرع وتأكل أقل. مؤقّت — يُزال عادة بعد نحو ستة أشهر — وأنجع مع تغيير نمط الحياة.\n• التكميم بالمنظار (ESG): غرز داخلية تعيد تشكيل المعدة أنبوبًا ضيّقًا فتقلّ سعتها دون إزالة نسيج.\n• علاج الشفط: أنبوب يسمح بتصريف جزء من الوجبة من المعدة بعد الأكل.\n\nبعد أيٍّ منها تتّبع غذاءً متدرّجًا — سوائل صافية ثم كاملة ثم مهروس ثم طري وأخيرًا قوام عادي — مع ارتشاف السوائل كثيرًا والأكل ببطء. الغثيان أو المغص المبكر شائع. النتائج تعتمد على استمرار عادات الأكل والنشاط، لذا المتابعة مهمّة."]},
 {id:'surg',icon:'🏥',cat:'surgery',min:6,t:['Bariatric surgery: sleeve & bypass','جراحة السمنة: التكميم والتحويل'],body:[
  "Bariatric (metabolic) surgery is the most effective and durable treatment for severe obesity, and it often improves or resolves type 2 diabetes, high blood pressure, sleep apnoea and fatty liver. The two most common operations:\n\n• Sleeve gastrectomy: about 80% of the stomach is removed, leaving a narrow tube. You feel full on much smaller amounts, and hunger hormones fall.\n• Roux-en-Y gastric bypass: a small stomach pouch is connected to a lower part of the small intestine, reducing intake and changing gut hormones and absorption.\n\nSurgery is a tool that requires lifelong partnership: a pre-op work-up and liver-shrink diet, a carefully staged post-op diet, daily vitamins for life, protein and fluid goals, and regular follow-up with blood tests. It is very safe in experienced centres, but like any operation it has risks, which your surgeon will explain.\n\nWeight regain can happen if habits slip, so the eating, activity and follow-up work continues long after the operation.",
  "جراحة السمنة (الأيضية) أكثر العلاجات فعالية ودوامًا للسمنة الشديدة، وغالبًا تحسّن أو تُزيل السكري من النوع الثاني وارتفاع الضغط وانقطاع النفس النومي والكبد الدهني. أشيع عمليتين:\n\n• التكميم: يُزال نحو ٨٠٪ من المعدة تاركًا أنبوبًا ضيّقًا. تشعر بالشبع على كميات أصغر، وتنخفض هرمونات الجوع.\n• تحويل المسار (Roux-en-Y): تُوصل جيبة معدية صغيرة بجزء أدنى من الأمعاء الدقيقة، فتقلّ الكمية وتتغيّر هرمونات الأمعاء والامتصاص.\n\nالجراحة أداة تتطلّب شراكة مدى الحياة: تقييم قبل الجراحة وحمية تصغير الكبد، وغذاء متدرّج بعناية بعدها، وفيتامينات يومية مدى الحياة، وأهداف بروتين وسوائل، ومتابعة منتظمة بتحاليل الدم. آمنة جدًا في المراكز الخبيرة، لكن كأي عملية لها مخاطر يشرحها جرّاحك.\n\nقد يحدث استرجاع للوزن إن تراخت العادات، لذا يستمر عمل الأكل والنشاط والمتابعة طويلًا بعد العملية."]},
 {id:'postop',icon:'🍽️',cat:'surgery',min:5,t:['Post-op diet & vitamins','الغذاء والفيتامينات بعد العملية'],body:[
  "After endoscopic or surgical procedures your stomach needs time to heal, so food is reintroduced in stages — typically clear liquids, then full liquids, then puréed foods, then soft foods, and finally regular textures over about six to eight weeks. Your team gives you the exact timing.\n\nGolden rules through every stage: protein first, sip fluids between (not during) meals, eat slowly and chew thoroughly, stop at the first sign of fullness, and avoid sugary drinks and fizzy drinks. Aim for the protein and fluid targets your team sets to protect muscle and prevent dehydration.\n\nAfter bariatric surgery the body absorbs fewer nutrients, so lifelong daily supplements are essential — usually a bariatric multivitamin, vitamin B12, iron, calcium with vitamin D, and folic acid — with periodic blood tests to catch any deficiency early. Watch for persistent vomiting, inability to keep fluids down, severe pain, or dumping (sweating, racing heart, cramps and diarrhoea after sweet or rich food); the first three need urgent care.",
  "بعد الإجراءات التنظيرية أو الجراحية تحتاج معدتك وقتًا للشفاء، فيُعاد إدخال الطعام على مراحل — عادة سوائل صافية ثم كاملة ثم أطعمة مهروسة ثم طرية وأخيرًا قوام عادي خلال نحو ستة إلى ثمانية أسابيع. يحدّد فريقك التوقيت الدقيق.\n\nقواعد ذهبية في كل مرحلة: البروتين أولًا، وارتشاف السوائل بين الوجبات لا أثناءها، والأكل ببطء والمضغ جيدًا، والتوقّف عند أول شعور بالشبع، وتجنّب المشروبات المحلّاة والغازية. استهدف أهداف البروتين والسوائل التي يحدّدها فريقك لحماية العضلات ومنع الجفاف.\n\nبعد جراحة السمنة يمتصّ الجسم عناصر أقل، لذا المكمّلات اليومية مدى الحياة ضرورية — عادة فيتامينات متعدّدة للسمنة، وب١٢، وحديد، وكالسيوم مع فيتامين د، وحمض فوليك — مع تحاليل دورية لاكتشاف أي نقص مبكرًا. انتبه للقيء المستمر أو عدم القدرة على إبقاء السوائل أو الألم الشديد أو الإغراق (تعرّق، خفقان، مغص وإسهال بعد الطعام الحلو أو الدسم)؛ الثلاثة الأولى تحتاج رعاية عاجلة."]},
 {id:'choose',icon:'🧭',cat:'basics',min:4,t:['Choosing your pathway','اختيار مسارك'],body:[
  "The right pathway depends on your starting point, health conditions, previous attempts, and what fits your life — and the pathways combine rather than compete. Lifestyle change is the foundation under all of them.\n\nAs a broad picture that your doctor personalises: dietary and lifestyle work suits everyone and is often tried first; medications are typically considered at a higher BMI or when weight-related conditions are present; endoscopic procedures offer a less invasive step with faster recovery; and bariatric surgery is the most effective option for severe obesity, especially with conditions like type 2 diabetes.\n\nThere is no failure in moving between pathways or using several tools together. Decisions should be shared with a specialist team who can weigh the benefits and risks for you. Use this app to learn, prepare good questions, and track your journey — whichever route you take.",
  "المسار المناسب يعتمد على نقطة بدايتك وحالاتك الصحية ومحاولاتك السابقة وما يناسب حياتك — والمسارات تتكامل لا تتنافس. تغيير نمط الحياة أساس تحتها جميعًا.\n\nكصورة عامة يخصّصها طبيبك: العمل الغذائي ونمط الحياة يناسب الجميع ويُجرَّب أولًا غالبًا؛ والأدوية تُدرَس عادة عند مؤشر أعلى أو وجود حالات مرتبطة بالوزن؛ والإجراءات التنظيرية خطوة أقل توغّلًا وأسرع تعافيًا؛ وجراحة السمنة الخيار الأكثر فعالية للسمنة الشديدة، خاصة مع حالات كالسكري من النوع الثاني.\n\nلا فشل في الانتقال بين المسارات أو استخدام عدة أدوات معًا. تُتّخذ القرارات بالشراكة مع فريق مختص يوازن الفوائد والمخاطر لك. استخدم التطبيق لتتعلّم وتحضّر أسئلة جيدة وتتابع رحلتك — أيًّا كان طريقك."]},
 {id:'plateau',icon:'📉',cat:'living',min:3,t:['Plateaus & keeping it off','الثبات والحفاظ على النتيجة'],body:[
  "Weight loss almost never happens in a straight line. As you lose weight the body needs fewer calories and adapts to defend its weight, so progress slows and plateaus are normal — not a sign of failure. The day-to-day scale also swings with fluids, food, salt and sleep, so weekly or trend views tell you more than a single morning.\n\nWhen a plateau lasts, it can help to revisit portions and sugary drinks, add or vary activity, protect sleep, and make sure protein stays high to preserve muscle. If you are on a medication or have had a procedure, your team may review the plan.\n\nKeeping weight off is its own skill: ongoing monitoring, steady habits, and staying connected with your team all reduce regain. Treat lapses as data, not disaster — notice what happened and return to your routine.",
  "نادرًا ما يسير نقص الوزن في خط مستقيم. مع النقص يحتاج الجسم سعرات أقل ويتكيّف للدفاع عن وزنه، فيبطؤ التقدّم والثبات طبيعي — لا علامة فشل. كما يتأرجح الميزان يوميًا مع السوائل والطعام والملح والنوم، لذا النظرة الأسبوعية أو الاتجاه أصدق من صباح واحد.\n\nعند طول الثبات قد يفيد مراجعة الحصص والمشروبات المحلّاة، وإضافة أو تنويع النشاط، وحماية النوم، وإبقاء البروتين مرتفعًا للحفاظ على العضلات. إن كنت على دواء أو أجريت إجراءً فقد يراجع فريقك الخطة.\n\nالحفاظ على النتيجة مهارة بذاتها: المتابعة المستمرة والعادات الثابتة والبقاء على تواصل مع فريقك تقلّل الاسترجاع. اعتبر الزلّات بيانات لا كارثة — لاحظ ما حدث وعُد لروتينك."]},
 {id:'mind',icon:'💚',cat:'living',min:3,t:['Mind, mood & eating','النفس والمزاج والأكل'],body:[
  "Weight and mood are closely linked. Stress, low mood, poor sleep and emotional eating can all work against your goals, and rigid all-or-nothing thinking often backfires. Being kind and patient with yourself is not a soft extra — it genuinely improves long-term results.\n\nHelpful practices: notice hunger versus emotional cues before eating, build non-food ways to cope with stress, avoid labelling foods or days as \"good\" or \"bad,\" and celebrate non-scale wins like more energy, better sleep, easier movement and improved lab numbers.\n\nIf eating feels out of control, if food causes distress, or if low mood or anxiety is affecting daily life, reach out to your healthcare team — support is available and effective, and it is a normal part of managing weight well.",
  "الوزن والمزاج مترابطان. التوتر وتدنّي المزاج وقلة النوم والأكل العاطفي تعمل ضد أهدافك، والتفكير الصارم «الكل أو لا شيء» غالبًا يأتي بعكسه. اللطف والصبر مع نفسك ليسا رفاهية — بل يحسّنان النتائج طويلة الأمد فعلًا.\n\nممارسات مفيدة: ميّز الجوع عن المحفّزات العاطفية قبل الأكل، وابنِ وسائل غير غذائية لمواجهة التوتر، وتجنّب وصف الأطعمة أو الأيام بـ«جيدة» أو «سيئة»، واحتفِ بمكاسب غير الميزان كالطاقة والنوم وسهولة الحركة وتحسّن التحاليل.\n\nإن شعرت أن الأكل خارج السيطرة، أو سبّب الطعام ضيقًا، أو أثّر تدنّي المزاج أو القلق في حياتك اليومية، تواصل مع فريقك الصحي — الدعم متاح وفعّال، وهو جزء طبيعي من إدارة الوزن جيدًا."]}

  reminders:[],            // {id,kind,label,time,days,enabled}

  water:[],                // {date, ml}
  journal:[],              // {date, hunger, mood, note}

  seenDays:[]
};}
function deepMerge(b,o){if(b===null||typeof b!=='object'||Array.isArray(b))return o===undefined?b:o;const out=Object.assign({},b);if(o&&typeof o==='object'&&!Array.isArray(o)){for(const k in o){const x=b[k],y=o[k];out[k]=(x&&typeof x==='object'&&!Array.isArray(x)&&y&&typeof y==='object'&&!Array.isArray(y))?deepMerge(x,y):y;}}return out;}
function load(){try{const v=JSON.parse(localStorage.getItem(KEY));return v?deepMerge(blank(),v):blank();}catch(e){return blank();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
let S=load();

/* ---------- date helpers ---------- */
function todayKey(d){d=d||new Date();return d.toISOString().slice(0,10);}
function daysAgo(k){return Math.round((Date.now()-new Date(k+'T00:00').getTime())/864e5);}
function lastNDays(n){const a=[];for(let i=n-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);a.push(todayKey(d));}return a;}
function fmtDate(iso){const d=new Date(iso);return d.toLocaleDateString(isAr()?'ar-SA':'en-GB',{day:'numeric',month:'short'});}
function fmtTime(iso){return new Date(iso).toLocaleTimeString(isAr()?'ar-SA':'en-GB',{hour:'2-digit',minute:'2-digit'});}
function streak(){let n=0;for(let i=0;i<400;i++){const d=new Date();d.setDate(d.getDate()-i);if(S.seenDays.includes(todayKey(d)))n++;else if(i>0)break;}return n;}
function markDay(){const k=todayKey();if(!S.seenDays.includes(k)){S.seenDays.push(k);save();}}

/* ---------- metrics helpers ---------- */
function latestWeight(){return S.weights.length?S.weights[S.weights.length-1].kg:(S.user.startWeight||null);}
function bmiVal(){const w=latestWeight(),h=S.user.heightCm;if(!w||!h)return null;return w/Math.pow(h/100,2);}
function bmiCat(b){if(b==null)return{l:['—','—'],c:'var(--muted)'};if(b<18.5)return{l:['Underweight','نقص وزن'],c:'var(--accent2)'};if(b<25)return{l:['Healthy range','نطاق صحي'],c:'var(--good)'};if(b<30)return{l:['Overweight','زيادة وزن'],c:'var(--warn)'};if(b<35)return{l:['Obesity I','سمنة (١)'],c:'#FF9A3E'};if(b<40)return{l:['Obesity II','سمنة (٢)'],c:'var(--bad)'};return{l:['Obesity III','سمنة (٣)'],c:'var(--bad)'};}
function idealWeight(){const h=S.user.heightCm;if(!h)return null;return 25*Math.pow(h/100,2);}
function tbwl(){const s=S.user.startWeight,w=latestWeight();if(!s||!w||s<=0)return null;return (s-w)/s*100;}
function ewl(){const s=S.user.startWeight,w=latestWeight(),iw=idealWeight();if(!s||!w||!iw||(s-iw)<=0)return null;return (s-w)/(s-iw)*100;}
function goalPct(){const s=S.user.startWeight,w=latestWeight(),g=S.user.targetWeight;if(!s||!w||!g||(s-g)<=0)return null;return Math.max(0,Math.min(100,(s-w)/(s-g)*100));}

/* ---------- UI helpers ---------- */
function toast(m){const e=$('#toast');const ok=/✓|🎉|تم|حفظ|Saved|Logged|Added|Nice|أحسنت|Copied|نُسخ|Exported|صُدّر|أُضيف/i.test(String(m));e.innerHTML=(ok?'<span class="tst-check">✓</span>':'')+esc(String(m));e.classList.toggle('ok',ok);e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1800);}
function openSheet(h){$('#sheet').innerHTML='<div class="grip"></div>'+h;$('#sheetbg').classList.add('open');}
function closeSheet(){$('#sheetbg').classList.remove('open');}
$('#sheetbg').addEventListener('click',e=>{if(e.target.id==='sheetbg')closeSheet();});
function topbar(titleK,subK,opts){opts=opts||{};const left=opts.back?`<button class="iconbtn" onclick="goBack()">${isAr()?'›':'‹'}</button>`:'';const right=opts.right||'';return `<div class="topbar">${left}<div style="flex:1"><h1>${opts.rawTitle||t(titleK)}</h1>${subK||opts.rawSub?`<div class="sub">${opts.rawSub||t(subK)}</div>`:''}</div>${right}</div>`;}
function applyTheme(){document.documentElement.setAttribute('data-mode',S.prefs.theme==='light'?'light':'dark');const m=$('meta[name=theme-color]');if(m)m.setAttribute('content',S.prefs.theme==='light'?'#F1F7F5':'#0B0F14');}
function applyDir(){document.documentElement.lang=S.lang||'en';document.documentElement.dir=isAr()?'rtl':'ltr';applyTheme();}

/* ---------- router ---------- */
const ROUTES={};let CURRENT='splash',STACK=[],CURRENT_OPTS={};
function route(n,fn){ROUTES[n]=fn;}
function go(n,o){o=o||{};if(!o.replace&&CURRENT&&CURRENT!==n)STACK.push(CURRENT);CURRENT=n;CURRENT_OPTS=o;render();}
function goBack(){if(STACK.length){CURRENT=STACK.pop();render();}else navTab('today');}
const MAIN=['today','track','progress','learn','more'];
function navTab(n){STACK=[];CURRENT=n;CURRENT_OPTS={};render();}
function render(){applyDir();const host=$('#screens');host.innerHTML='';const fn=ROUTES[CURRENT]||ROUTES['today'];const node=el('<div class="screen active"></div>');fn(node,CURRENT_OPTS);host.appendChild(node);node.scrollTop=0;try{animNums(node);}catch(e){}const tb=$('#tabbar');if(MAIN.includes(CURRENT)){tb.classList.remove('hidden');renderTabs();}else tb.classList.add('hidden');const fab=$('#fab');if(fab)fab.classList.toggle('show',CURRENT==='today');}

  openSheet(`<h2 style="margin:4px 0 4px">${ar?'تسجيل سريع':'Quick log'}</h2><p class="muted" style="font-size:12.5px;margin:0 0 14px">${ar?'اختر ما تريد تسجيله':'Pick what to log'}</p>
   <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">${items.map(([ty,ic,lab])=>`<button class="chip" style="flex-direction:column;display:flex;align-items:center;gap:6px;padding:15px 6px" onclick="closeSheet();setTimeout(()=>openLog('${ty}'),120)"><span style="font-size:24px">${ic}</span><span style="font-size:12px">${L(lab)}</span></button>`).join('')}</div>`);};
function renderTabs(){const tb=$('#tabbar');const items=[['today','🏠','tabToday'],['track','➕','tabTrack'],['progress','📈','tabProgress'],['learn','📚','tabLearn'],['more','⋯','tabMore']];tb.innerHTML=items.map(([n,ic,lab])=>`<button class="tab ${CURRENT===n?'on':''}" onclick="navTab('${n}')"><span class="ic">${ic}</span>${t(lab)}</button>`).join('');}

/* ---------- charts (inline SVG) ---------- */
function sparkline(vals,color,W,H){W=W||300;H=H||70;color=color||'var(--accent)';if(!vals.length)return '';const mx=Math.max(...vals),mn=Math.min(...vals);const X=i=>10+i*(W-20)/Math.max(vals.length-1,1);const Y=v=>H-12-(v-mn)/((mx-mn)||1)*(H-24);const pts=vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(' ');const dots=vals.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.4" fill="${color}"/>`).join('');const gid='sp'+Math.random().toString(36).slice(2,8);const areaPts='10,'+(H-2)+' '+pts+' '+(W-10)+','+(H-2);return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.28"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><polygon points="${areaPts}" fill="url(#${gid})"/><polyline fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" points="${pts}"/>${dots}</svg>`;}
function barChart(vals,labels,color,ref){const W=320,H=120,n=vals.length;color=color||'var(--accent2)';const mx=Math.max(...vals,ref||0,1);const bw=(W-30)/n*.62;const X=i=>20+i*(W-30)/n+((W-30)/n-bw)/2;const Y=v=>H-20-v/mx*(H-34);let bars=vals.map((v,i)=>`<rect x="${X(i).toFixed(1)}" y="${Y(v).toFixed(1)}" width="${bw.toFixed(1)}" height="${(H-20-Y(v)).toFixed(1)}" rx="3" fill="${color}"/>`).join('');let rl='';if(ref){rl=`<line x1="20" y1="${Y(ref).toFixed(1)}" x2="${W-10}" y2="${Y(ref).toFixed(1)}" stroke="var(--warn)" stroke-width="1.4" stroke-dasharray="4 3"/><text x="${W-12}" y="${(Y(ref)-3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--warn)">${ref}</text>`;}const xl=labels?labels.map((l,i)=>`<text x="${(X(i)+bw/2).toFixed(1)}" y="${H-7}" text-anchor="middle" font-size="8" fill="var(--faint)">${l}</text>`).join(''):'';return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" font-family="inherit">${bars}${rl}${xl}</svg>`;}
function ring(pct,color,label,sub){color=color||'var(--accent)';const R=52,C=2*Math.PI*R,off=C*(1-Math.max(0,Math.min(100,pct))/100);return `<svg viewBox="0 0 140 140" width="140" height="140"><circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--card2)" stroke-width="12"/><circle cx="70" cy="70" r="${R}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${C.toFixed(1)}" class="ringfx" data-off="${off.toFixed(1)}" transform="rotate(-90 70 70)"/><text x="70" y="66" text-anchor="middle" font-size="26" font-weight="800" fill="var(--txt)" font-family="inherit">${label}</text><text x="70" y="88" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="inherit">${sub||''}</text></svg>`;}
function heatmap(){const days=lastNDays(35);return `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px">${days.map(d=>{const c=S.logs.filter(l=>l.t.slice(0,10)===d).length+S.weights.filter(w=>w.date===d).length;const lvl=c===0?0:c<2?1:c<4?2:3;const col=['var(--card2)','#0c3a32','#0e7d68','var(--accent)'][lvl];return `<div title="${d}" style="aspect-ratio:1;border-radius:5px;background:${col};border:1px solid var(--line)"></div>`;}).join('')}</div>`;}

function weekActiveDays(){let n=0;const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const on=S.seenDays.includes(todayKey(d));if(on)n++;days.push(on);}return {n,days};}
function weekCard(){const ar=isAr();const wk=weekActiveDays();const st=streak();

  else {const logs=allEvents().filter(e=>new Date(e.t)>=cut).length;hi=logs?(ar?`سجّلت ${logs} إدخالاً هذا الأسبوع`:`You logged ${logs} ${logs===1?'entry':'entries'} this week`):(ar?'ابدأ بتسجيل يومك':'Start logging your day');}
  const dots=wk.days.map(on=>`<span style="width:15px;height:15px;border-radius:50%;display:inline-block;background:${on?'var(--accent)':'var(--card2)'};border:1.5px solid ${on?'var(--accent)':'var(--line)'}"></span>`).join('');

   <div class="row" style="gap:7px;margin:11px 0 4px">${dots}</div>

function liRow(l){const m=TYPE_META[l.type]||['•',['Log','سجل']];let sub='';if(l.type==='weight')sub=l.kg+' kg';else if(l.type==='waist')sub=l.cm+' cm';else if(l.type==='lab')sub=L(LABKEYS[l.key]||['',''])+': '+l.val;else if(l.type==='meal'){const dot=l.q?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${mealQuality(l.tags).c};margin-inline-end:5px;vertical-align:middle"></span>`:'';sub=dot+((l.tags||[]).map(i=>L(MEALTAGS[i])).join(', ')||L(['Meal','وجبة']));}else if(l.type==='activity')sub=(l.act!=null?L(ACTS[l.act]):'')+(l.mins?' · '+l.mins+(isAr()?' د':' min'):'')+(l.steps?' · '+l.steps+(isAr()?' خطوة':' steps'):'');else if(l.type==='med'&&l.med)sub=L((MEDS.find(x=>x.id===l.med)||{n:['','']}).n);else if(l.type==='symptom'&&l.sym!=null)sub=L(SYMPTOMS[l.sym])+(l.sev!=null?' · '+[t('mild'),t('moderate'),t('severe')][l.sev]:'');if(l.notes)sub=(sub?sub+' · ':'')+esc(l.notes.slice(0,32));return `<div class="li"><div class="ic">${m[0]}</div><div class="tx"><b>${L(m[1])}</b><small>${sub||fmtDate(l.t)}</small></div><small class="muted">${fmtDate(l.t)}</small></div>`;}

function mealQuality(tags){tags=tags||[];const green=tags.some(i=>[0,1,2].includes(i));const red=tags.some(i=>[3,4,5,6].includes(i));if(green&&!red)return{q:'green',c:'var(--good)',l:['Balanced choice','خيار متوازن']};if(red&&!green)return{q:'red',c:'var(--bad)',l:['Occasional treat','لمرّة أحيانًا']};if(green&&red)return{q:'yellow',c:'var(--warn)',l:['Mixed','متنوّع']};return{q:'gray',c:'var(--faint)',l:['Logged','مسجّل']};}

window.calcHealthy=()=>{const ht=parseFloat($('#h_ht').value);const ar=isAr();if(!ht)return toast(ar?'أدخل الطول':'Enter height');const m=ht/100;const lo=18.5*m*m,hi=24.9*m*m;const w=latestWeight();let where='';if(w){const b=w/(m*m);where=`<div class="disc-note" style="margin-top:10px">${ar?'وزنك الحالي ':'Your current weight '}<b>${w} kg</b> — ${b<18.5?(ar?'تحت النطاق':'below range'):b<25?(ar?'داخل النطاق ✓':'within range ✓'):(ar?'فوق النطاق بـ '+ (w-hi).toFixed(1)+' كجم':(w-hi).toFixed(1)+' kg above range')}.</div>`;}

window.calcTargets=()=>{const wt=parseFloat($('#tg_wt').value);const ar=isAr();if(!wt)return toast(ar?'أدخل الوزن':'Enter weight');const p1=Math.round(wt*1.0),p2=Math.round(wt*1.5),fl=Math.round(wt*30/1000*10)/10;const surg=S.user.pathway==='surgery'||S.user.pathway==='endoscopic';

window.icsReminder=(id)=>{const r=S.reminders.find(x=>x.id===id);if(!r)return;const [hh,mm]=r.time.split(':');const dt=new Date();dt.setHours(+hh,+mm,0,0);if(dt<new Date())dt.setDate(dt.getDate()+1);const pad=x=>String(x).padStart(2,'0');const stamp=d=>d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+'T'+pad(d.getUTCHours())+pad(d.getUTCMinutes())+'00Z';const rule=r.days==='weekdays'?'FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR':'FREQ=DAILY';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Qawam//EN','BEGIN:VEVENT','UID:'+r.id+'@qawam','DTSTAMP:'+stamp(new Date()),'DTSTART:'+stamp(dt),'RRULE:'+rule,'SUMMARY:Qawam — '+r.label,'BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY','DESCRIPTION:'+r.label,'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='qawam-reminder.ics';a.click();toast(isAr()?'أُضيف للتقويم':'Added to calendar');};
let _rtick=null,_fired={};

   S.reminders.forEach(r=>{if(!r.enabled||r.time!==hm)return;if(r.days==='weekdays'&&(dow===5||dow===6))return;if(_fired[r.id]===key)return;_fired[r.id]=key;try{new Notification('Qawam · قوام',{body:r.label,icon:'qawam-192.png'});}catch(e){}});},30000);}

function fmtMMSS(s){const m=Math.floor(s/60),ss=s%60;return m+':'+String(ss).padStart(2,'0');}

  },1000);};

   ${MTYPES.map(mt=>{const rows=S.measures.filter(x=>x.type===mt[0]).sort((a,b)=>a.date<b.date?-1:1);if(!rows.length)return '';const vals=rows.slice(-10).map(r=>r.cm);const last=rows[rows.length-1];return `<div class="card"><div class="between" style="margin-bottom:4px"><b>${L([mt[1],mt[2]])}</b><b style="color:var(--accent)">${last.cm} cm</b></div>${vals.length>1?sparkline(vals,'var(--accent)'):''}</div>`;}).join('')||''}
  </div>`;});
window.openMeasure=()=>{const ar=isAr();openSheet(`<h2 style="margin:4px 0 12px">📐 ${ar?'إضافة قياس':'Add a measurement'}</h2>
  <div class="field"><label>${ar?'المكان':'Area'}</label><div class="chips" id="msT">${MTYPES.map(mt=>`<button class="chip" data-v="${mt[0]}" onclick="pick('msT',this)">${L([mt[1],mt[2]])}</button>`).join('')}</div></div>
  <div class="grid2"><div class="field"><label>${ar?'المحيط (سم)':'Circumference (cm)'}</label><input class="input" id="msV" inputmode="decimal" placeholder="e.g. 100"></div>
  <div class="field"><label>${ar?'التاريخ':'Date'}</label><input class="input" id="msD" type="date" value="${todayKey()}"></div></div>
  <button class="btn btn-primary" onclick="saveMeasure()">${t('save')}</button>`);};
window.saveMeasure=()=>{const ty=$('#msT');if(!ty.dataset.val)return toast(isAr()?'اختر المكان':'Pick an area');const v=parseFloat($('#msV').value);if(isNaN(v))return toast(isAr()?'أدخل رقمًا':'Enter a number');S.measures.push({date:$('#msD').value||todayKey(),type:ty.dataset.val,cm:v});save();closeSheet();toast(t('saved'));render();};

route('photos',(n)=>{const ar=isAr();const list=S.photos.slice().sort((a,b)=>a.date<b.date?1:-1);
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'صور التقدّم':'Progress photos'})}<div class="content">
   <div class="disc-note">${ar?'تُحفظ الصور على جهازك فقط ولا تُرفع لأي خادم. تُصغَّر تلقائيًا لتوفير المساحة.':'Photos are stored only on your device and never uploaded. They are auto-shrunk to save space.'}</div>
   <label class="btn btn-primary" style="cursor:pointer">📷 ${ar?'إضافة صورة':'Add a photo'}<input type="file" accept="image/*" style="display:none" onchange="addPhoto(this)"></label>
   ${list.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${list.map(p=>`<div style="position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line)"><img src="${p.data}" style="width:100%;display:block;aspect-ratio:3/4;object-fit:cover"><span style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(0,0,0,.7),transparent);color:#fff;font-size:11px;padding:14px 8px 6px">${fmtDate(p.date+'T00:00')}</span><button onclick="delPhoto('${p.date}',${JSON.stringify(p.data.slice(-12))})" style="position:absolute;top:6px;inset-inline-end:6px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;width:26px;height:26px;cursor:pointer">✕</button></div>`).join('')}</div>`:`<div class="card center" style="padding:30px"><div style="font-size:34px">📷</div><p class="muted" style="margin-top:6px">${ar?'لا صور بعد.':'No photos yet.'}</p></div>`}
  </div>`;});
window.addPhoto=(input)=>{const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const max=480;let w=img.width,h=img.height;const s=Math.min(1,max/Math.max(w,h));const c=document.createElement('canvas');c.width=Math.round(w*s);c.height=Math.round(h*s);c.getContext('2d').drawImage(img,0,0,c.width,c.height);let data;try{data=c.toDataURL('image/jpeg',0.6);}catch(err){data=e.target.result;}S.photos.push({date:todayKey(),data});try{save();toast(t('saved'));}catch(err){S.photos.pop();toast(isAr()?'المساحة ممتلئة':'Storage full');}render();};img.src=e.target.result;};r.readAsDataURL(f);};
window.delPhoto=(date,tail)=>{S.photos=S.photos.filter(p=>!(p.date===date&&JSON.stringify(p.data.slice(-12))===JSON.stringify(tail)));save();render();};

const PREOP=[['p1','Complete required labs, scans & assessments','أكمل التحاليل والأشعة والتقييمات المطلوبة'],['p2','Start the liver-shrink (pre-op) diet as advised','ابدأ حمية تصغير الكبد حسب التوجيه'],['p3','Stop smoking well before surgery','أوقف التدخين قبل الجراحة بوقت كافٍ'],['p4','Arrange time off work & help at home','رتّب إجازة ومساعدة في المنزل'],['p5','Stock protein drinks & bariatric vitamins','جهّز مشروبات البروتين وفيتامينات السمنة'],['p6','Confirm which medications to adjust with your team','أكّد مع فريقك الأدوية التي ستُعدّل']];
const POSTOP=[['q1','Sip fluids often to stay hydrated','ارتشف السوائل كثيرًا للترطيب'],['q2','Protein first at every meal','البروتين أولًا في كل وجبة'],['q3','Take your daily vitamins','تناول فيتاميناتك اليومية'],['q4','Walk a little, several times a day','امشِ قليلًا عدة مرات يوميًا'],['q5','Advance diet stage only when your team says','تقدّم لمرحلة الغذاء التالية بموافقة فريقك فقط'],['q6','Attend follow-up visits & lab checks','احضر زيارات المتابعة والتحاليل']];

  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'قوائم التحقّق':'Checklists'})}<div class="content">
   <div class="disc-note">${ar?'قوائم عامة للتحضير والتعافي — اتبع تعليمات فريقك الخاصة بك.':'General prep & recovery lists — follow your own team’s specific instructions.'}</div>
