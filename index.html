/* ============================================================ COURSES (Noom-style multi-day programs) ============================================================ */
const COURSES=[
 {id:'found',icon:'🌱',color:'#10B981',t:['Foundations','الأساسيات'],sub:['10 days to sustainable habits','١٠ أيام لعادات مستدامة'],days:[
  {t:['Weight is not willpower','الوزن ليس مسألة إرادة'],b:['Excess weight is a chronic condition shaped by genes, hormones, sleep and environment — not a character flaw. Managing it is a long game, so be kind to yourself. Small, sustained changes beat short crash diets every time.','الوزن الزائد حالة مزمنة تُشكّلها الجينات والهرمونات والنوم والبيئة — لا عيب في الشخصية. إدارته سباق طويل، فكن لطيفًا مع نفسك. التغييرات الصغيرة المستدامة تتفوّق دائمًا على الحميات القاسية القصيرة.']},
  {t:['Set a realistic goal','ضع هدفًا واقعيًا'],b:['Aim for a gradual 5–10% loss to start — even that meaningfully improves blood sugar, blood pressure and energy. Pick a pace you can actually keep, and track weekly rather than daily so normal fluctuations don’t discourage you.','استهدف نقصًا تدريجيًا ٥–١٠٪ كبداية — حتى هذا يحسّن السكّر والضغط والطاقة بوضوح. اختر وتيرة تستطيع الالتزام بها، وتابع أسبوعيًا لا يوميًا حتى لا تُثبّطك التذبذبات الطبيعية.']},
  {t:['Protein first','البروتين أولًا'],b:['Make protein the anchor of every meal — it keeps you full for longer and protects muscle as you lose weight. Eggs, dairy, legumes, chicken and fish all count. Try to include some at breakfast, when most people skip it.','اجعل البروتين محور كل وجبة — يطيل شبعك ويحمي عضلاتك أثناء النقص. البيض والألبان والبقوليات والدجاج والسمك كلها تُحتسب. حاول إدراجه في الفطور حيث يهمله الأكثرون.']},
  {t:['Half your plate = vegetables','نصف الطبق خضار'],b:['Vegetables add volume, fiber and fullness for very few calories. Fresh, frozen or cooked all count. Make them the biggest part of the plate and you naturally leave less room for heavier foods.','تضيف الخضار حجمًا وأليافًا وشبعًا بسعرات قليلة جدًا. الطازجة والمجمّدة والمطبوخة كلها تُحتسب. اجعلها أكبر جزء من الطبق فيقلّ تلقائيًا مكان الأطعمة الثقيلة.']},
  {t:['Rethink your drinks','أعِد التفكير في مشروباتك'],b:['Sugary drinks add calories without making you full — they’re one of the easiest wins to change. Swap juice and soda for water, and keep a bottle within reach so the healthy choice is the easy one.','المشروبات المحلّاة تضيف سعرات دون شبع — وتغييرها من أسهل المكاسب. استبدل العصير والغازي بالماء، وأبقِ قارورة قريبة ليكون الخيار الصحي هو الأسهل.']},
  {t:['Move a little more','تحرّك أكثر قليلًا'],b:['Aim for about 150 minutes a week of activity you enjoy, plus some strength work to protect muscle. Start small — a 10-minute walk counts, and just after meals is a great time for blood sugar.','استهدف نحو ١٥٠ دقيقة أسبوعيًا من نشاط تحبّه، مع بعض تمارين القوة لحماية العضلات. ابدأ صغيرًا — مشي ١٠ دقائق يُحتسب، وبعد الوجبات وقت ممتاز لسكّر الدم.']},
  {t:['Protect your sleep','احمِ نومك'],b:['Short or poor sleep raises appetite hormones and cravings the next day. Aim for 7–9 hours and a simple wind-down routine. Good sleep is a genuine weight-management tool, not a luxury.','النوم القصير أو السيّئ يرفع هرمونات الشهية والرغبة في اليوم التالي. استهدف ٧–٩ ساعات وروتين تهدئة بسيطًا. النوم الجيّد أداة حقيقية لإدارة الوزن لا رفاهية.']},
  {t:['Slow down at meals','تمهّل في الوجبات'],b:['Fullness signals take about 20 minutes to arrive. Eat slowly, chew well, and put your utensils down between bites. You’ll enjoy your food more and usually eat less without feeling deprived.','تستغرق إشارات الشبع نحو ٢٠ دقيقة. كُل ببطء، وامضغ جيدًا، وضع الأدوات بين اللقمات. ستستمتع بطعامك أكثر وتأكل أقل عادة دون شعور بالحرمان.']},
  {t:['Plateaus are normal','الثبات طبيعي'],b:['As you lose weight your body needs fewer calories, so progress slows — a plateau is expected, not failure. Revisit portions, drinks, activity and sleep, stay patient, and keep going. The trend matters more than any single week.','مع النقص يحتاج جسمك سعرات أقل فيبطؤ التقدّم — الثبات متوقّع لا فشل. راجِع الحصص والمشروبات والنشاط والنوم، واصبر، وواصل. الاتجاه أهم من أي أسبوع واحد.']},
  {t:['Keeping it off','الحفاظ على النتيجة'],b:['Maintenance is its own skill: steady habits, ongoing tracking, and self-kindness. Treat slips as data, not disaster — notice what happened and return to your routine. You’ve built the foundation; now keep building on it.','الحفاظ مهارة بذاتها: عادات ثابتة، ومتابعة مستمرة، ولطف مع النفس. اعتبر الزلّات بيانات لا كارثة — لاحظ ما حدث وعُد لروتينك. لقد بنيت الأساس؛ فواصل البناء عليه.']}
 ]},
 {id:'glp1',icon:'💊',color:'#0EA5E9',t:['GLP-1 companion','رفيق أدوية GLP-1'],sub:['8 days alongside your medication','٨ أيام مع دوائك'],days:[
  {t:['How these medicines work','كيف تعمل هذه الأدوية'],b:['GLP-1 medicines mimic a gut hormone that reduces appetite and slows stomach emptying, so you feel full sooner and eat less. They are tools, not shortcuts — they work best alongside the eating and activity habits you’re building.','أدوية GLP-1 تحاكي هرمون أمعاء يقلّل الشهية ويبطئ إفراغ المعدة، فتشعر بالشبع أسرع وتأكل أقل. هي أدوات لا اختصارات — تعمل أفضل مع عادات الأكل والنشاط التي تبنيها.']},
  {t:['Start low, go slow','ابدأ منخفضًا وتدرّج ببطء'],b:['Doses are increased gradually to limit side effects. Follow your doctor’s schedule exactly — never rush, skip ahead, or change the dose yourself. Steady and slow gives your body time to adjust.','تُرفع الجرعات تدريجيًا للحدّ من الآثار الجانبية. اتبع جدول طبيبك تمامًا — لا تتعجّل أو تقفز أو تغيّر الجرعة بنفسك. التدرّج البطيء يمنح جسمك وقتًا للتأقلم.']},
  {t:['Managing nausea','التعامل مع الغثيان'],b:['Nausea is the most common early effect. Eat smaller meals, stop when comfortably full, favour bland lower-fat foods, sip fluids, and avoid lying down right after eating. It usually settles as your body adjusts.','الغثيان أكثر الآثار المبكرة. تناول وجبات أصغر، وتوقّف عند الشبع المريح، وفضّل أطعمة خفيفة قليلة الدهن، وارتشف السوائل، وتجنّب الاستلقاء بعد الأكل مباشرة. يهدأ عادة مع تأقلم الجسم.']},
  {t:['Your injection routine','روتين الحقن'],b:['If your medicine is an injection, rotate the site (abdomen, thigh, upper arm), use a fresh needle each time, and pick a consistent day for weekly medicines. Store the pen as directed — often refrigerated.','إن كان دواؤك حقنة، بدّل الموضع (البطن، الفخذ، أعلى الذراع)، واستخدم إبرة جديدة كل مرة، واختر يومًا ثابتًا للأدوية الأسبوعية. احفظ القلم حسب التعليمات — غالبًا بالثلاجة.']},
  {t:['Protect your muscle','احمِ عضلاتك'],b:['Faster weight loss can cost muscle as well as fat. Keep your protein high and add strength activity a couple of times a week, so most of what you lose is fat and you stay strong.','النقص الأسرع قد يفقدك عضلات مع الدهون. أبقِ البروتين مرتفعًا وأضِف تمارين قوة مرتين أسبوعيًا، ليكون معظم ما تفقده دهنًا وتبقى قويًا.']},
  {t:['Stay hydrated & regular','حافظ على الترطيب والانتظام'],b:['Eating less can lead to dehydration and constipation. Sip water through the day and keep fiber up with vegetables, fruit and whole grains. Tell your doctor about any severe or lasting symptoms.','الأكل الأقل قد يسبّب جفافًا وإمساكًا. ارتشف الماء طوال اليوم وأبقِ الألياف عالية بالخضار والفواكه والحبوب الكاملة. أخبر طبيبك بأي أعراض شديدة أو مستمرة.']},
  {t:['When progress slows','عندما يبطؤ التقدّم'],b:['Plateaus happen on medication too, and your team may review the plan. Keep the lifestyle habits going — they’re what make the medicine work better and what protect your results over time.','يحدث الثبات مع الدواء أيضًا، وقد يراجع فريقك الخطة. واصل عادات نمط الحياة — فهي ما يجعل الدواء أنجع وما يحمي نتائجك عبر الوقت.']},
  {t:['Thinking long term','التفكير بعيد المدى'],b:['Weight often returns if the medicine stops, so it’s usually taken long term under review — and the habits you build now are what truly last. Keep your follow-up appointments and stay in touch with your team.','غالبًا يعود الوزن عند إيقاف الدواء، لذا يؤخذ عادة طويلًا تحت المتابعة — والعادات التي تبنيها الآن هي ما يدوم فعلًا. حافظ على مواعيد المتابعة وابقَ على تواصل مع فريقك.']}
 ]},
 {id:'bari',icon:'🏥',color:'#F59E0B',t:['Bariatric journey','رحلة جراحة السمنة'],sub:['10 days before & after surgery','١٠ أيام قبل وبعد الجراحة'],days:[
  {t:['Is surgery right for you','هل الجراحة مناسبة لك'],b:['Bariatric surgery is the most effective, durable option for severe obesity and often improves diabetes and blood pressure. It’s a lifelong partnership, not a quick fix — the decision is made together with your specialist team.','جراحة السمنة أكثر الخيارات فعالية ودوامًا للسمنة الشديدة وغالبًا تحسّن السكري والضغط. إنها شراكة مدى الحياة لا حلًّا سريعًا — ويُتّخذ القرار مع فريقك المختص.']},
  {t:['Before surgery: prepare','قبل الجراحة: استعد'],b:['Complete your labs and assessments, and follow the liver-shrink diet exactly — it makes the operation safer. Stop smoking well ahead, and arrange time off and help at home for your recovery.','أكمل تحاليلك وتقييماتك، واتبع حمية تصغير الكبد تمامًا — فهي تجعل العملية أأمن. أوقف التدخين مبكرًا، ورتّب إجازة ومساعدة في المنزل لتعافيك.']},
  {t:['The operation','العملية'],b:['Sleeve gastrectomy removes most of the stomach; gastric bypass reroutes the gut. Both reduce how much you eat and change hunger hormones. Your surgeon will explain the specific risks and benefits for you.','التكميم يزيل معظم المعدة؛ وتحويل المسار يعيد توجيه الأمعاء. كلاهما يقلّل كمية الأكل ويغيّر هرمونات الجوع. سيشرح جرّاحك المخاطر والفوائد الخاصة بك.']},
  {t:['Stage 1–2: liquids','المرحلة ١–٢: السوائل'],b:['Start with clear then full liquids: sip slowly and often, protein first. Small volumes are completely normal now. Your main jobs are gentle hydration and getting your protein in.','ابدأ بالسوائل الصافية ثم الكاملة: ارتشف ببطء وكثرة، والبروتين أولًا. الكميات الصغيرة طبيعية تمامًا الآن. مهمتك الترطيب اللطيف وإدخال البروتين.']},
  {t:['Stage 3: puréed','المرحلة ٣: المهروس'],b:['Move to smooth, blended, protein-first foods when your team says. Eat slowly and stop at the first sign of fullness — no lumps yet. Overeating now is uncomfortable, so let small portions be enough.','انتقل إلى أطعمة مهروسة ناعمة والبروتين أولًا بموافقة فريقك. كُل ببطء وتوقّف عند أول شعور بالشبع — بلا كتل بعد. الإفراط الآن مزعج، فاكتفِ بالحصص الصغيرة.']},
  {t:['Stage 4–5: soft then regular','المرحلة ٤–٥: طري ثم عادي'],b:['Introduce soft, then regular textures over the following weeks as advised. Chew thoroughly, protein first, and avoid sugary and fizzy drinks. Rushing textures can cause pain or vomiting — go at your team’s pace.','أدخِل الأطعمة الطرية ثم العادية خلال الأسابيع التالية حسب التوجيه. امضغ جيدًا، والبروتين أولًا، وتجنّب المشروبات المحلّاة والغازية. التسرّع قد يسبّب ألمًا أو قيئًا — تدرّج بوتيرة فريقك.']},
  {t:['Vitamins for life','فيتامينات مدى الحياة'],b:['Your body now absorbs fewer nutrients, so daily supplements are essential for life — usually a bariatric multivitamin, B12, iron, calcium with vitamin D, and folate — with periodic blood tests to catch any deficiency early.','يمتصّ جسمك الآن عناصر أقل، فالمكمّلات اليومية ضرورية مدى الحياة — عادة فيتامينات متعددة للسمنة، وب١٢، وحديد، وكالسيوم مع فيتامين د، وفوليك — مع تحاليل دورية لاكتشاف أي نقص مبكرًا.']},
  {t:['Protein & fluids','البروتين والسوائل'],b:['Aim for your team’s protein target (often 60–80 g/day) to protect muscle, and sip fluids between meals rather than during them to stay hydrated without crowding your small stomach.','استهدف هدف البروتين لفريقك (غالبًا ٦٠–٨٠ جم/يوم) لحماية العضلات، وارتشف السوائل بين الوجبات لا أثناءها لتبقى رطبًا دون ازدحام معدتك الصغيرة.']},
  {t:['Watch for dumping','انتبه للإغراق'],b:['After a bypass, sweet or rich foods can trigger dumping — sweating, a racing heart, cramps and diarrhea soon after eating. Favour protein and complex carbs, and limit sugar to keep it at bay.','بعد تحويل المسار، قد يثير الطعام الحلو أو الدسم الإغراق — تعرّق، خفقان، مغص وإسهال بعد الأكل بقليل. فضّل البروتين والنشويات المعقّدة، وقلّل السكّر لتجنّبه.']},
  {t:['Long-term success','النجاح بعيد المدى'],b:['Weight can return if habits slip, so activity, protein and follow-up continue for life. Celebrate non-scale wins — energy, mobility, better labs — and stay connected to your team. Surgery is a powerful tool; your habits keep it working.','قد يعود الوزن إن تراخت العادات، لذا يستمر النشاط والبروتين والمتابعة مدى الحياة. احتفِ بمكاسب غير الميزان — طاقة، حركة، تحاليل أفضل — وابقَ على تواصل مع فريقك. الجراحة أداة قوية؛ وعاداتك تُبقيها فعّالة.']}
 ]}
];
function courseById(id){return COURSES.find(c=>c.id===id);}
function cDone(id){return (S.courses[id]&&S.courses[id].done)||[];}
function cNext(id){const c=courseById(id);const done=cDone(id);for(let i=0;i<c.days.length;i++)if(!done.includes(i))return i;return c.days.length-1;}
function cStarted(id){return cDone(id).length>0;}

route('courses',(n)=>{const ar=isAr();n.innerHTML=`${topbar(null,null,{back:true,rawTitle:ar?'البرامج':'Courses',rawSub:ar?'دروس يومية قصيرة لتغيير دائم':'short daily lessons for lasting change'})}<div class="content">
   ${COURSES.map(c=>{const done=cDone(c.id).length,tot=c.days.length,pct=Math.round(done/tot*100);return `<div class="card tap" onclick="go('course',{id:'${c.id}'})" style="background:linear-gradient(150deg,${c.color}18,transparent)"><div class="row" style="gap:13px"><div style="width:46px;height:46px;border-radius:13px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:24px;flex:none">${c.icon}</div><div style="flex:1;min-width:0"><b style="font-size:15px">${L(c.t)}</b><div class="muted" style="font-size:12.5px;margin-top:1px">${L(c.sub)}</div><div class="pbar" style="margin-top:8px"><i style="width:${pct}%"></i></div></div></div><div class="between" style="margin-top:8px"><small class="muted">${done}/${tot} ${ar?'يوم':'days'}</small><small style="color:${c.color};font-weight:700">${done===0?(ar?'ابدأ':'Start'):done>=tot?(ar?'اكتمل ✓':'Complete ✓'):(ar?'متابعة':'Continue')} ${ar?'‹':'›'}</small></div></div>`;}).join('')}
   <div class="disc-note">${ar?'محتوى تثقيفي عام — ليس نصيحة طبية فردية. قرارات العلاج تُتّخذ مع فريقك.':'General education — not individual medical advice. Treatment decisions are made with your team.'}</div>
  </div>`;});

route('course',(n,o)=>{const ar=isAr();const c=courseById(o.id);if(!c)return go('courses');const done=cDone(c.id);const nx=cNext(c.id);
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:L(c.t)})}<div class="content">
   <div class="card" style="background:linear-gradient(150deg,${c.color}22,transparent)"><div class="row" style="gap:13px"><div style="font-size:34px">${c.icon}</div><div><b style="font-size:16px">${L(c.t)}</b><div class="muted" style="font-size:12.5px">${L(c.sub)}</div></div></div><div class="pbar" style="margin-top:12px"><i style="width:${Math.round(done.length/c.days.length*100)}%"></i></div><div class="muted" style="font-size:12px;margin-top:6px">${done.length}/${c.days.length} ${ar?'مكتمل':'completed'}</div></div>
   <button class="btn btn-primary" onclick="go('lesson',{id:'${c.id}',day:${nx}})">${done.length===0?(ar?'ابدأ اليوم ١':'Start day 1'):done.length>=c.days.length?(ar?'راجع الدروس':'Review lessons'):(ar?'متابعة · اليوم ':'Continue · Day ')+(nx+1)}</button>
   <div class="card">${c.days.map((d,i)=>{const isDone=done.includes(i);return `<div class="li" style="cursor:pointer" onclick="go('lesson',{id:'${c.id}',day:${i}})"><div class="ic" style="background:${isDone?c.color:'var(--card2)'};color:${isDone?'#fff':'var(--muted)'};font-weight:800">${isDone?'✓':(i+1)}</div><div class="tx"><b style="font-weight:600">${L(d.t)}</b><small>${ar?'اليوم':'Day'} ${i+1}</small></div><div class="chev">${ar?'‹':'›'}</div></div>`;}).join('')}</div>
  </div>`;});

route('lesson',(n,o)=>{const ar=isAr();const c=courseById(o.id);if(!c)return go('courses');const i=o.day||0;const d=c.days[i];const done=cDone(c.id).includes(i);const last=i>=c.days.length-1;
  n.innerHTML=`${topbar(null,null,{back:true,rawTitle:(ar?'اليوم ':'Day ')+(i+1)+'/'+c.days.length})}<div class="content">
   <div class="card"><div class="row" style="gap:10px;margin-bottom:10px"><div style="width:38px;height:38px;border-radius:11px;background:${c.color}22;display:flex;align-items:center;justify-content:center;font-size:20px">${c.icon}</div><div><small class="muted" style="font-size:11.5px">${L(c.t)}</small><b style="display:block;font-size:17px;letter-spacing:-.3px">${L(d.t)}</b></div></div>
     <p style="font-size:15.5px;line-height:1.85;margin:0">${L(d.b)}</p></div>
   <button class="btn ${done?'btn-ghost':'btn-primary'}" onclick="toggleLesson('${c.id}',${i})">${done?(ar?'✓ مكتمل — إلغاء':'✓ Completed — undo'):(ar?'وضع علامة مكتمل':'Mark complete')}</button>
   <div class="grid2">
     ${i>0?`<button class="btn btn-ghost" onclick="go('lesson',{id:'${c.id}',day:${i-1}})">${ar?'› السابق':'‹ Previous'}</button>`:'<div></div>'}
     ${!last?`<button class="btn btn-ghost" onclick="go('lesson',{id:'${c.id}',day:${i+1}})">${ar?'التالي ‹':'Next ›'}</button>`:`<button class="btn btn-ghost" onclick="go('course',{id:'${c.id}'})">${ar?'نظرة عامة':'Overview'}</button>`}
   </div>
  </div>`;});
window.toggleLesson=(id,day)=>{const st=S.courses[id]||{done:[]};const k=st.done.indexOf(day);if(k<0){st.done.push(day);toast(isAr()?'🎉 أحسنت':'🎉 Nice!');}else st.done.splice(k,1);S.courses[id]=st;save();
  const c=courseById(id);if(k<0&&day<c.days.length-1)go('lesson',{id,day:day+1});else render();};

/* ---------- animated number count-ups (best-app motion) ---------- */
function animNums(root){var rm=window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;root.querySelectorAll('.ringfx').forEach(function(c){var o=c.getAttribute('data-off');if(o==null)return;if(rm){c.style.strokeDashoffset=o;return;}requestAnimationFrame(function(){requestAnimationFrame(function(){c.style.strokeDashoffset=o;});});});if(rm)return;root.querySelectorAll('.kpi .v').forEach(function(el){if(el.children.length)return;var raw=el.textContent.trim().replace(/,/g,'');if(!/^\d+(\.\d+)?$/.test(raw))return;var to=parseFloat(raw);if(!(to>0)||to>100000)return;var dec=raw.indexOf('.')>=0?1:0;var t0=performance.now();(function step(t){var k=Math.min((t-t0)/520,1);var e2=1-Math.pow(1-k,3);el.textContent=(to*e2).toFixed(dec);if(k<1)requestAnimationFrame(step);else el.textContent=raw;})(performance.now());});}

/* ---------- boot ---------- */
window.navTab=navTab;window.go=go;window.goBack=goBack;window.closeSheet=closeSheet;
applyDir();
if(typeof Notification!=='undefined'&&Notification.permission==='granted')startReminderTick();
go('splash',{replace:true});
</script>
